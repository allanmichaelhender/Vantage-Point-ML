# 🎯 1. The HTTP Redirect (Port 80)
server {
    listen 80;
    server_name vantage-point.ddnsfree.com;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everyone else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 🎯 2. The HTTPS Application (Port 443)
server {
    listen 443 ssl;
    server_name vantage-point.ddnsfree.com;

    # SSL Certificates (Ensure these paths match your Certbot volumes)
    ssl_certificate /etc/letsencrypt/live/vantage-point.ddnsfree.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vantage-point.ddnsfree.com/privkey.pem;

    # Serve the React Build
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Gunicorn
    location /api/v1 {
        proxy_pass http://tennis_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
