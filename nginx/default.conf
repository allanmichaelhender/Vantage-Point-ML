

server {
    listen 80;
    server_name vantage-point.ddnsfree.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vantage-point.ddnsfree.com;

    ssl_certificate /etc/letsencrypt/live/vantage-point.ddnsfree.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vantage-point.ddnsfree.com/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/v1 {
        proxy_pass http://tennis_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
